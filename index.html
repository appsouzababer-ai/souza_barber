<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Souza Barbershop</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL='https://xtmbsjsvlsiqbhgtvwwi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0bWJzanN2bHNpcWJoZ3R2d3dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNzg0ODQsImV4cCI6MjA5ODY1NDQ4NH0.hHIS33Hdd-ZjI3co3Hsg-Ou_cFYlAtFR3ome1EablTQ';

const supabaseClient = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0b0b0b,#171717);color:#fff;min-height:100vh}

.screen{display:none;padding:24px;max-width:560px;margin:auto;animation:fade .35s ease}
.active{display:block}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:none}
}

.logo{display:block;margin:20px auto;width:150px;border-radius:50%;box-shadow:0 10px 30px rgba(212,175,55,.25)}

input,textarea{
width:100%;
padding:14px 16px;
margin:10px 0;
border-radius:16px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(12px);
color:#fff
}

button{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:#D4AF37;
color:#111;
font-weight:700;
cursor:pointer;
transition:.25s;
box-shadow:0 8px 24px rgba(212,175,55,.25)
}

button:hover{transform:translateY(-2px)}
button:active{transform:scale(.98)}

.secondary{background:transparent;box-shadow:none;color:#d8d8d8}

.card{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(12px);
padding:18px;
margin:12px 0;
border-radius:20px
}

.slot{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:90px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
padding:12px;
margin:6px;
border-radius:14px;
cursor:pointer
}

.selected{
background:#D4AF37;
color:#111
}

.center{text-align:center}

a{color:#D4AF37;text-decoration:none}

h1,h2{margin:18px 0}
p{line-height:1.6;margin:10px 0}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
<img class="logo" src="https://i.postimg.cc/VkxDCXD6/Souza-Barber.png">

<input id="loginInstagram" placeholder="Instagram">
<input id="loginSenha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="show('cadastro')">Criar Conta</button>
<button onclick="show('recuperar')">Recuperar Senha</button>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="screen">
<button onclick="show('login')">Voltar</button>

<input id="nome" placeholder="Nome">
<input id="whats" placeholder="WhatsApp">
<input id="instagram" placeholder="Instagram">
<input id="email" placeholder="E-mail (recuperação)">
<input id="senha" type="password" placeholder="Senha">

<button onclick="cadastrar()">Salvar</button>
</div>

<!-- RECUPERAR -->
<div id="recuperar" class="screen">
<button onclick="show('login')">Voltar</button>
<input id="recEmail" placeholder="E-mail">
<button onclick="recuperar()">Enviar</button>
</div>

<!-- HOME -->
<div id="home" class="screen center">
<button onclick="logout()">Sair</button>
<img class="logo" src="https://i.postimg.cc/VkxDCXD6/Souza-Barber.png">

<p>Bem-vindo</p>

<button onclick="loadServicos();show('servicos')">Agendar Horário</button>
</div>

<!-- SERVIÇOS -->
<div id="servicos" class="screen">
<button onclick="show('home')">Voltar</button>
<h2>Serviços</h2>
<div id="listaServicos"></div>
</div>

<!-- DATA -->
<div id="data" class="screen">
<button onclick="show('servicos')">Voltar</button>

<input type="date" id="agData" onchange="carregarHorarios()">

<button onclick="show('horario')">Próximo</button>
</div>

<!-- HORÁRIO -->
<div id="horario" class="screen">
<button onclick="show('data')">Voltar</button>
<h2>Horários</h2>
<div id="horarios"></div>
<button onclick="finalizar()">Confirmar</button>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="screen">
<input id="admUser" placeholder="Usuário">
<input id="admPass" type="password" placeholder="Senha">
<button onclick="loginAdmin()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">

<div class="tabs">
<button onclick="tab='clientes';loadAdmin()">Clientes</button>
<button onclick="tab='agendamentos';loadAdmin()">Agendamentos</button>
<button onclick="tab='servicos';loadAdmin()">Serviços</button>
</div>

<div id="adminContent"></div>

</div>

<script>

let user=null;
let servicoSelecionado=null;
let horarioSelecionado=null;
let tab='clientes';

/* LOGIN */
async function login(){

const { data } = await supabaseClient
.from('usuarios')
.select('*')
.eq('instagram',loginInstagram.value)
.eq('senha',loginSenha.value)
.single();

if(!data){alert('erro login');return;}

user=data;
show('home');
}

/* CADASTRO */
async function cadastrar(){

await supabaseClient.from('usuarios').insert([{
nome:nome.value,
whats:whats.value,
instagram:instagram.value,
email:email.value,
senha:senha.value
}]);

alert('Cadastro OK');
show('login');
}

/* RECUPERAR */
async function recuperar(){

const { data } = await supabaseClient
.from('usuarios')
.select('instagram')
.eq('email',recEmail.value)
.single();

if(data){
alert('Seu login é: @'+data.instagram);
}
}

/* SERVIÇOS */
async function loadServicos(){

const { data } = await supabaseClient.from('servicos').select('*');

let html='';

data.forEach(s=>{
html+=`
<div class="card" onclick="selectServico(${s.id},'${s.nome}',${s.valor})">
${s.nome} - R$${s.valor}
</div>`;
});

listaServicos.innerHTML=html;
}

function selectServico(id,nome,valor){
servicoSelecionado={id,nome,valor};
show('data');
}

/* HORÁRIOS + BLOQUEIO */
async function carregarHorarios(){

const fixos=[
'08:00','08:50','09:40','10:30','11:20',
'14:00','14:50','15:40','16:30','17:20','18:10'
];

const { data } = await supabaseClient
.from('agendamentos')
.select('horario')
.eq('data',agData.value);

let ocupados=(data||[]).map(x=>x.horario);

horarios.innerHTML='';

fixos.forEach(h=>{

let d=document.createElement('div');
d.className='slot';
d.innerText=h;

if(ocupados.includes(h)){
d.style.opacity=.3;
d.style.pointerEvents='none';
}else{
d.onclick=()=>{
horarioSelecionado=h;
document.querySelectorAll('.slot').forEach(x=>x.classList.remove('selected'));
d.classList.add('selected');
};
}

horarios.appendChild(d);

});

/* dia lotado */
if(ocupados.length>=fixos.length){
alert('Dia completo');
show('servicos');
}
}

/* FINALIZAR + WHATSAPP */
async function finalizar(){

await supabaseClient.from('agendamentos').insert([{
usuario_id:user.id,
servico_id:servicoSelecionado.id,
data:agData.value,
horario:horarioSelecionado
}]);

window.open(
`https://wa.me/5588999514333?text=Agendamento: ${user.nome} - ${servicoSelecionado.nome} - ${agData.value} ${horarioSelecionado}`,
'_blank'
);

show('home');
}

/* ADMIN */
async function loginAdmin(){
if(admUser.value==='admin' && admPass.value==='123456'){
show('admin');
loadAdmin();
}
}

async function loadAdmin(){

let html='';

if(tab==='clientes'){

const { data } = await supabaseClient.from('usuarios').select('*');

data.forEach(u=>{
html+=`
<div class="card">
<b>${u.nome}</b><br>
<a href="https://wa.me/${u.whats}" target="_blank">WhatsApp</a><br>
<a href="https://instagram.com/${u.instagram}" target="_blank">@${u.instagram}</a>
</div>`;
});
}

if(tab==='agendamentos'){

const { data } = await supabaseClient.from('agendamentos').select(`
*,usuarios(nome,whats),servicos(nome)
`);

data.forEach(a=>{
html+=`
<div class="card">
<b>${a.usuarios.nome}</b><br>
${a.servicos.nome}<br>
📅 ${a.data} ${a.horario}<br>
<a href="https://wa.me/${a.usuarios.whats}" target="_blank">WhatsApp</a>
</div>`;
});
}

if(tab==='servicos'){

const { data } = await supabaseClient.from('servicos').select('*');

data.forEach(s=>{
html+=`
<div class="card">
<input value="${s.nome}" onchange="editServico(${s.id},'nome',this.value)">
<input value="${s.valor}" onchange="editServico(${s.id},'valor',this.value)">
</div>`;
});
}

adminContent.innerHTML=html;
}

async function editServico(id,field,value){
let obj={};
obj[field]=value;

await supabaseClient
.from('servicos')
.update(obj)
.eq('id',id);
}

/* NAV */
function show(id){
document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

</script>

</body>
</html>
